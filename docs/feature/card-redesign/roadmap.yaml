  - id: 02-02
    name: Add metadata chips section
    description: >
      Add pill-shaped badges showing file count and dependency count.
      Format: "📁 N files" and "🔗 N deps". Hide deps chip when count is 0.
    criteria:
    - File chip shows "📁 N files" with pill styling
    - Dep chip shows "🔗 N deps" with pill styling
    - Dep chip hidden when dependencyCount is 0
    - Chips use bg-gray-800 rounded-full styling
    files_to_modify:
