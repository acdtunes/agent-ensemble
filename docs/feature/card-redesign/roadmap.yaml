    name: Implement tall card layout with top bar
    description: >
      Refactor StepCard to use min-h-[160px], flex-col layout,
      and 4px colored top border instead of left border.
      Remove text truncation on step name (allow wrap).
    criteria:
    - Card has min-height of approximately 160px
    - Top border is 4px with status-appropriate color
    - Left border is removed
    - Step name wraps to multiple lines instead of truncating
    - Flex-column layout with proper spacing
    files_to_modify:
    - board/src/components/StepCard.tsx
    - board/src/__tests__/StepCard.test.tsx
    deps:
