roadmap:
  project_id: en-consolidation
  short_description: Consolidate nWave vendor into en-prefixed local packages
  description: >
    Sync upstream nWave artifacts into a pristine vendor directory, rename
    agent_ensemble to en, generate en-prefixed commands/agents/skills via
    sync script, rewrite deliver as deterministic parallel executor, and
    provide a single install.sh for setup.
  created_at: '2026-03-07T23:19:15Z'
  total_steps: 19
  phases: 5
phases:
- id: '01'
  name: 'Vendor Setup'
  steps:
  - id: 01-01
    name: 'Fetch nWave upstream into nwave/'
    description: >
      Download nWave upstream (commands, agents, skills, DES scripts, templates)
      into nwave/ as pristine vendor directory. No renames, no edits.
    criteria:
    - "nwave/ contains commands/, agents/, skills/, scripts/des/, scripts/templates/
      from upstream"
    - "All files are byte-for-byte identical to upstream source"
    - "nwave/ is committed to git as a trackable vendor directory"
    time_estimate: 30m
    dependencies: []
    files_to_modify:
    - nwave/commands/
    - nwave/agents/
    - nwave/skills/
    - nwave/scripts/des/
    - nwave/scripts/templates/
    status: approved
    teammate_id: crafter-01-01
    started_at: '2026-03-07T23:27:29.872148+00:00'
    review_attempts: 1
    completed_at: '2026-03-07T23:37:59.597521+00:00'
    review_history:
    - cycle: 1
      timestamp: '2026-03-07T23:37:59.597521+00:00'
      outcome: approved
      feedback: nwave/ populated from upstream
  - id: 01-02
    name: 'Validate vendor integrity and structure'
    description: >
      Verify vendor directory matches upstream structure. Confirm no files
      were renamed or edited during population. Validate git tracking.
    criteria:
    - "Vendor files match upstream byte-for-byte (no modifications)"
    - "Missing upstream directory triggers clear error"
    - "Manual edits to nwave/ are overwritten on next sync"
    time_estimate: 20m
    dependencies:
    - 01-01
    files_to_modify:
    - nwave/
    status: approved
    teammate_id: crafter-01-02
    started_at: '2026-03-07T23:41:15.042184+00:00'
    review_attempts: 1
    completed_at: '2026-03-07T23:54:49.447366+00:00'
    review_history:
    - cycle: 1
      timestamp: '2026-03-07T23:54:49.447366+00:00'
      outcome: approved
      feedback: 'Approved: SHA-based validation, required dirs check, bash 3.x compatible'
  - id: 01-03
    name: 'Handle upstream unavailability'
    description: >
      Vendor population fails gracefully when upstream is unreachable.
      Existing vendor directory is not modified on failure.
    criteria:
    - "Unreachable upstream produces clear connectivity error"
    - "Existing nwave/ is not modified on failure"
    - "Exit code is non-zero on failure"
