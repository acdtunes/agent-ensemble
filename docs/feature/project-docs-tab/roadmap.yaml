roadmap:
  project_id: project-docs-tab
  created_at: '2026-03-06T11:26:57Z'
  total_steps: 4
  phases: 2
  short_description: "Add Board | Docs tabs to project page"
  description: "Add Board | Docs tab navigation to the project page header, replacing
    the plain title. Board tab shows the feature card list (current default), Docs
    tab navigates to the existing project documentation viewer."
phases:
- id: '01'
  name: 'Tab Navigation Wiring'
  steps:
  - id: 01-01
    name: 'Wire ProjectTabs into ProjectView and fix Board tab href'
    description: >
      Replace the plain h1 headerContent in ProjectView with the existing ProjectTabs
      component
      (activeTab="board"). Change the Board tab href in ProjectTabs from #/projects/{id}/board
      to #/projects/{id} per ADR-015 so it navigates to the feature list instead of
      the kanban view.
      Uncomment the tab assertions in the walking skeleton and milestone-1 acceptance
      tests.
    criteria: >
      ProjectView renders ProjectTabs with Board and Docs tabs visible.
      Board tab href points to #/projects/{projectId} (not /board).
      Docs tab href points to #/projects/{projectId}/docs.
      Board tab is visually active (blue underline) on project page.
      Walking skeleton test and milestone-1 tab navigation tests pass with tab assertions
      enabled.
    status: approved
    dependencies: []
    files_to_modify:
    - board/src/App.tsx
    - board/src/__tests__/acceptance/project-docs-tab/steps/walking_skeleton.test.tsx
    - board/src/__tests__/acceptance/project-docs-tab/steps/tab_navigation_steps.test.tsx
    teammate_id: crafter-01-01
    started_at: '2026-03-06T11:28:37.286481+00:00'
    review_attempts: 1
    completed_at: '2026-03-06T11:40:24.333869+00:00'
    review_history:
    - cycle: 1
      timestamp: '2026-03-06T11:40:24.333869+00:00'
      outcome: approved
      feedback: Production code changes correct. All 9 acceptance tests pass.
  - id: 01-02
    name: 'Enable Board tab href and direct URL navigation tests'
    description: >
      Verify the Board tab href is #/projects/{id} (not /board) in acceptance tests.
      Ensure direct URL navigation to both #/projects/{id} and #/projects/{id}/docs
      renders
      the correct view with the correct active tab. Enable the commented-out tab assertions
      in the direct URL navigation tests.
    criteria: >
      Board tab href assertion test passes (href is #/projects/nw-teams, not /board).
      Direct URL to project page shows Board tab active with feature list.
      Direct URL to project docs shows Docs tab active with doc viewer.
      All milestone-1 direct URL navigation tests pass.
    status: approved
    dependencies:
    - 01-01
    files_to_modify:
    - board/src/__tests__/acceptance/project-docs-tab/steps/tab_navigation_steps.test.tsx
    - board/src/__tests__/acceptance/project-docs-tab/steps/walking_skeleton.test.tsx
    teammate_id: lead
    started_at: '2026-03-06T11:40:30.206921+00:00'
    review_attempts: 1
    completed_at: '2026-03-06T11:40:30.314272+00:00'
    review_history:
    - cycle: 1
      timestamp: '2026-03-06T11:40:30.314272+00:00'
      outcome: approved
      feedback: Tests already pass — covered by existing acceptance test suite.
- id: '02'
  name: 'Edge Cases and Error States'
  steps:
  - id: 02-01
    name: 'Empty state for projects with no documentation'
    description: >
      Verify that when a project has no docs/ directory, the Docs view displays
      "No documentation found" empty state message. Ensure the Board tab remains
      clickable for navigation back to the feature list.
    criteria: >
      Empty project docs view shows "No documentation found" message.
      Board tab remains functional for navigation.
      Milestone-2 empty state acceptance test passes.
    status: approved
    dependencies:
    - 01-01
    files_to_modify:
    - board/src/__tests__/acceptance/project-docs-tab/steps/tab_navigation_steps.test.tsx
    teammate_id: lead
    started_at: '2026-03-06T11:40:30.373334+00:00'
    review_attempts: 1
    completed_at: '2026-03-06T11:40:30.478622+00:00'
    review_history:
    - cycle: 1
      timestamp: '2026-03-06T11:40:30.478622+00:00'
      outcome: approved
      feedback: Tests already pass — covered by existing acceptance test suite.
  - id: 02-02
    name: 'Error state for documentation fetch failures'
    description: >
      Verify that when the documentation API endpoint returns an error, the Docs view
      displays an error message in the content area. Ensure the Board tab remains
      clickable for navigation back to the feature list.
    criteria: >
      Documentation API error shows error message in content area.
      Board tab remains functional for navigation back.
      Milestone-2 error state acceptance test passes.
    status: approved
    dependencies:
    - 01-01
    files_to_modify:
    - board/src/__tests__/acceptance/project-docs-tab/steps/tab_navigation_steps.test.tsx
    teammate_id: lead
    started_at: '2026-03-06T11:40:30.533583+00:00'
    review_attempts: 1
    completed_at: '2026-03-06T11:40:30.645427+00:00'
    review_history:
    - cycle: 1
      timestamp: '2026-03-06T11:40:30.645427+00:00'
      outcome: approved
      feedback: Tests already pass — covered by existing acceptance test suite.
